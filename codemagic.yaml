workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v22.12.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          # 1. Forçar variáveis de ambiente para Java 21
          export JAVA_HOME=$JAVA_HOME_21
          export PATH=$JAVA_HOME/bin:$PATH
          
          # 2. Confirmar versão no log (para sabermos o que o Codemagic está a fazer)
          java -version
          
          cd android
          
          # 3. Limpeza agressiva
          chmod +x gradlew
          ./gradlew --stop
          rm -rf ~/.gradle/caches
          rm -rf .gradle
          
          # 4. Build forçando o motor Java 21 no Gradle
          ./gradlew assembleDebug \
            -Dorg.gradle.java.home=$JAVA_HOME \
            --no-build-cache \
            --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
