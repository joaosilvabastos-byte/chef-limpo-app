workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v22.12.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          # Limpeza profunda para apagar os ficheiros Java "versão 65" mal processados
          rm -rf ~/.gradle/caches
          rm -rf .gradle
          chmod +x gradlew
          # Usar o wrapper para garantir a versão 8.2.1
          ./gradlew assembleDebug --no-build-cache --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
