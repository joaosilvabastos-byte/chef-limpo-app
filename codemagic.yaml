workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v22.12.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          
          # 1. Limpeza total de segurança
          chmod +x gradlew
          ./gradlew --stop
          rm -rf ~/.gradle/caches
          rm -rf .gradle
          
          # 2. Build Simples. O Gradle por padrão usa o Java que está no PATH.
          # Se o 'java: 21' ali em cima estiver correto, ele vai ler.
          ./gradlew assembleDebug --no-build-cache --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
