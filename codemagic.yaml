workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v22.12.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          # Remove cache antigo para evitar conflitos de versão
          rm -rf .gradle
          chmod +x gradlew
          # O segredo é usar o gradlew (wrapper) que já aponta para a 8.2.1
          ./gradlew assembleDebug --no-build-cache --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
