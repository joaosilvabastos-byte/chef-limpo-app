workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v22.12.0
      java: 17        # ADICIONA ISTO: Essencial para Gradle 8.13 e SDK 36
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          rm -rf .gradle                       # Limpeza profunda de cache
          chmod +x gradlew
          ./gradlew clean assembleDebug --refresh-dependencies --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
