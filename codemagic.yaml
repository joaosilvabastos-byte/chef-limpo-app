workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v20.18.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Vite Build
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - joaosilvabastos@gmail.com
