name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # O agente do GitHub usa isto para não dar erro de download

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Vite Build
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          # O comando 'clean' ajuda o agente do GitHub a não usar lixo de builds anteriores
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 
